<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HyperRAG Console</title>

  <!-- Markdown renderer + sanitizer (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <style>
    :root{
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.06);
      --panel2: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.90);
      --muted: rgba(255,255,255,0.62);
      --accent: #7c5cff;
      --accent2:#22c55e;
      --danger:#ef4444;
      --shadow: 0 20px 60px rgba(0,0,0,0.40);
      --radius: 16px;
      --radius2: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(124,92,255,0.28), transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(34,197,94,0.16), transparent 60%),
        radial-gradient(900px 500px at 50% 90%, rgba(59,130,246,0.16), transparent 60%),
        var(--bg);
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 18px 40px;
    }

    .topbar{
      display:flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .brand{
      display:flex;
      flex-direction: column;
      gap: 6px;
    }
    .brand h1{
      margin:0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }
    .brand .sub{
      margin:0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .statuspill{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .dot{
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
    }
    .dot.ok{ background: var(--accent2); box-shadow: 0 0 0 4px rgba(34,197,94,0.18); }
    .dot.busy{ background: #f59e0b; box-shadow: 0 0 0 4px rgba(245,158,11,0.18); }
    .dot.err{ background: var(--danger); box-shadow: 0 0 0 4px rgba(239,68,68,0.18); }

    .grid{
      display:grid;
      grid-template-columns: 420px 1fr;
      gap: 16px;
    }

    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .card .hd{
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .card .hd .title{
      font-size: 13px;
      color: var(--muted);
      letter-spacing: .2px;
    }

    .card .bd{
      padding: 14px;
    }

    label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 6px;
    }

    input, select, textarea{
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 10px;
      outline: none;
      transition: border .2s ease, background .2s ease;
    }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(124,92,255,0.65);
      background: rgba(255,255,255,0.08);
    }

    textarea{
      min-height: 170px;
      resize: vertical;
      line-height: 1.45;
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btns{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button{
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      transition: transform .05s ease, background .2s ease, border .2s ease;
      font-size: 13px;
    }
    button:hover{
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
    }
    button:active{ transform: translateY(1px); }
    button.primary{
      background: rgba(124,92,255,0.22);
      border-color: rgba(124,92,255,0.50);
    }
    button.primary:hover{
      background: rgba(124,92,255,0.30);
      border-color: rgba(124,92,255,0.65);
    }
    button.ghost{
      background: transparent;
    }
    button.danger{
      background: rgba(239,68,68,0.14);
      border-color: rgba(239,68,68,0.45);
    }
    button:disabled{
      opacity: .55;
      cursor:not-allowed;
    }
    select {
      background-color: rgba(255,255,255,0.06);
      color: var(--text);
    }

    select option {
      background-color: #0b1020;   /* 深色背景 */
      color: rgba(255,255,255,0.92);
    }

    /* 有些浏览器用 optgroup */
    select optgroup {
      background-color: #0b1020;
      color: rgba(255,255,255,0.75);
    }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    /* Output */
    .outputWrap{
      display:flex;
      flex-direction: column;
      gap: 0;
      height: 720px;
    }
    .outputBody{
      padding: 14px;
      overflow:auto;
      height: 100%;
    }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .toolbar .right{
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip{
      font-size: 12px;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 6px 10px;
    }

    /* Markdown styles */
    .md{
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }
    .md h1,.md h2,.md h3{ line-height: 1.25; margin: 14px 0 8px; }
    .md h1{ font-size: 20px; }
    .md h2{ font-size: 18px; }
    .md h3{ font-size: 16px; }
    .md p{ margin: 10px 0; }
    .md a{ color: #9aa7ff; text-decoration: none; border-bottom: 1px dashed rgba(154,167,255,.45); }
    .md a:hover{ border-bottom-style: solid; }
    .md code{
      font-family: var(--mono);
      font-size: 12.5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 1px 6px;
      border-radius: 8px;
    }
    .md pre{
      margin: 12px 0;
      background: #0a0f1f;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px;
      overflow:auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }
    .md pre code{
      background: transparent;
      border: none;
      padding: 0;
      font-size: 12.5px;
      color: rgba(255,255,255,0.88);
    }
    .md blockquote{
      margin: 12px 0;
      padding: 10px 12px;
      border-left: 3px solid rgba(124,92,255,0.65);
      background: rgba(124,92,255,0.10);
      border-radius: 12px;
      color: rgba(255,255,255,0.80);
    }
    .md ul, .md ol{ margin: 8px 0 8px 22px; }
    .md hr{ border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 14px 0; }
    .md table{
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow:hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .md th, .md td{
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      vertical-align: top;
    }
    .md th{ background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.82); text-align:left; }
    .md tr:hover td{ background: rgba(255,255,255,0.04); }

    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .outputWrap{ height: 560px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>HyperRAG Console</h1>
        <p class="sub">
          支持非流式 <code>/query</code> 与流式 <code>/query_stream</code>。
          流式输出将实时以 Markdown 形式渲染。
        </p>
      </div>
      <div class="statuspill" title="服务状态">
        <span id="dot" class="dot"></span>
        <span id="statusText">Idle</span>
      </div>
    </div>

    <div class="grid">
      <!-- Left: Controls -->
      <div class="card">
        <div class="hd">
          <div class="title">Request</div>
          <div class="chip" id="endpointChip">Endpoint: /query_stream</div>
        </div>
        <div class="bd">
          <label>API Base URL</label>
          <input id="baseUrl" value="http://127.0.0.1:8000" />

          <div class="row2">
            <div>
              <label>Mode</label>
              <select id="mode">
                <option value="">(server default)</option>
                <option value="hyper">hyper</option>
                <option value="hyper-lite">hyper-lite</option>
                <option value="naive">naive</option>
              </select>
            </div>
            <div>
              <label>Call Type</label>
              <select id="callType">
                <option value="stream" selected>Streaming (/query_stream)</option>
                <option value="once">Once (/query)</option>
              </select>
            </div>
          </div>

          <label>Question</label>
          <textarea id="question">病理图中的核心内容是什么？</textarea>

          <div class="btns">
            <button id="sendBtn" class="primary">Send</button>
            <button id="stopBtn" class="danger" disabled>Stop</button>
            <button id="clearBtn" class="ghost">Clear</button>
          </div>

        </div>
      </div>

      <!-- Right: Output -->
      <div class="card outputWrap">
        <div class="hd">
          <div class="toolbar">
            <div class="title">Response (Markdown)</div>
            <div class="right">
              <span class="chip" id="metaChip">—</span>
              <button id="copyBtn">Copy</button>
            </div>
          </div>
        </div>
        <div class="outputBody">
          <div id="out" class="md">(no response yet)</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---------- Utilities ----------
    const $ = (id) => document.getElementById(id);

    // Markdown config
    marked.setOptions({
      gfm: true,
      breaks: true
    });

    function renderMarkdown(mdText) {
      // Markdown -> HTML -> sanitize
      const html = marked.parse(mdText || "");
      return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
    }

    function setStatus(state, text) {
      const dot = $("dot");
      dot.classList.remove("ok", "busy", "err");
      if (state === "ok") dot.classList.add("ok");
      else if (state === "busy") dot.classList.add("busy");
      else if (state === "err") dot.classList.add("err");
      $("statusText").textContent = text;
    }

    function buildRequest() {
      const baseUrl = $("baseUrl").value.trim().replace(/\/+$/, "");
      const mode = $("mode").value.trim();
      const question = $("question").value.trim();

      const headers = { "Content-Type": "application/json" };

      const body = { question };
      if (mode) body.mode = mode;

      return { baseUrl, headers, body };
    }

    function setBusy(b) {
      $("sendBtn").disabled = b;
      $("stopBtn").disabled = !b;
      $("callType").disabled = b;
    }

    // ---------- State ----------
    let abortController = null;
    let buffer = "";
    let renderTimer = null;
    let startedAt = 0;

    function startRenderLoop() {
      if (renderTimer) return;
      renderTimer = setInterval(() => {
        $("out").innerHTML = renderMarkdown(buffer);
      }, 120);
    }

    function stopRenderLoop() {
      if (renderTimer) clearInterval(renderTimer);
      renderTimer = null;
      $("out").innerHTML = renderMarkdown(buffer);
    }

    function updateEndpointChip() {
      const t = $("callType").value;
      $("endpointChip").textContent = t === "stream" ? "Endpoint: /query_stream" : "Endpoint: /query";
    }

    $("callType").addEventListener("change", updateEndpointChip);
    updateEndpointChip();

    // ---------- Actions ----------
    async function sendOnce() {
      setBusy(true);
      setStatus("busy", "Sending...");
      $("metaChip").textContent = "—";
      buffer = "";
      $("out").textContent = "";

      const { baseUrl, headers, body } = buildRequest();
      const t0 = performance.now();

      try {
        const resp = await fetch(baseUrl + "/query", {
          method: "POST",
          headers,
          body: JSON.stringify(body)
        });

        const text = await resp.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { raw: text }; }

        if (!resp.ok) {
          buffer = "```json\n" + JSON.stringify({ status: resp.status, ...data }, null, 2) + "\n```";
          $("out").innerHTML = renderMarkdown(buffer);
          setStatus("err", `Error (${resp.status})`);
          return;
        }

        // 兼容：如果后端返回 JSON {answer, ...}
        if (data && typeof data === "object" && data.answer) {
          buffer = data.answer;
          const latency = data.latency_ms != null ? `${data.latency_ms} ms` : `${Math.round(performance.now() - t0)} ms`;
          $("metaChip").textContent = `mode=${data.mode || "-"} · ${latency}`;
        } else {
          buffer = text;
          $("metaChip").textContent = `${Math.round(performance.now() - t0)} ms`;
        }

        $("out").innerHTML = renderMarkdown(buffer);
        setStatus("ok", "Done");
      } catch (e) {
        buffer = String(e);
        $("out").innerHTML = renderMarkdown(buffer);
        setStatus("err", "Network error");
      } finally {
        setBusy(false);
      }
    }

    async function sendStreaming() {
      setBusy(true);
      setStatus("busy", "Streaming...");
      $("metaChip").textContent = "—";
      buffer = "";
      $("out").textContent = "";

      const { baseUrl, headers, body } = buildRequest();
      startedAt = performance.now();

      abortController = new AbortController();
      const signal = abortController.signal;

      startRenderLoop();

      try {
        const resp = await fetch(baseUrl + "/query_stream", {
          method: "POST",
          headers,
          body: JSON.stringify(body),
          signal
        });

        if (!resp.ok) {
          const errText = await resp.text();
          stopRenderLoop();
          buffer = "```text\n" + errText + "\n```";
          $("out").innerHTML = renderMarkdown(buffer);
          setStatus("err", `Error (${resp.status})`);
          return;
        }

        if (!resp.body) {
          stopRenderLoop();
          buffer = "Your browser does not support streaming response body.";
          $("out").innerHTML = renderMarkdown(buffer);
          setStatus("err", "Not supported");
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let received = 0;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          received += chunk.length;
          buffer += chunk;

          // meta 信息（简单展示：已接收字符数、耗时）
          const ms = Math.round(performance.now() - startedAt);
          $("metaChip").textContent = `streaming · ${ms} ms · ${received} chars`;
        }

        stopRenderLoop();
        setStatus("ok", "Done");
      } catch (e) {
        stopRenderLoop();
        if (e && e.name === "AbortError") {
          setStatus("ok", "Stopped");
        } else {
          buffer += "\n\n[ERROR] " + String(e);
          $("out").innerHTML = renderMarkdown(buffer);
          setStatus("err", "Network error");
        }
      } finally {
        abortController = null;
        setBusy(false);
      }
    }

    function stopStreaming() {
      if (abortController) abortController.abort();
    }

    function clearOutput() {
      buffer = "";
      $("out").textContent = "(no response yet)";
      $("metaChip").textContent = "—";
      setStatus("", "Idle");
    }

    async function copyOutput() {
      try {
        await navigator.clipboard.writeText(buffer || "");
        $("metaChip").textContent = "copied";
        setTimeout(() => {
          if ($("metaChip").textContent === "copied") $("metaChip").textContent = "—";
        }, 800);
      } catch {
        // ignore
      }
    }

    async function send() {
      const t = $("callType").value;
      if (t === "once") return sendOnce();
      return sendStreaming();
    }

    $("sendBtn").addEventListener("click", send);
    $("stopBtn").addEventListener("click", stopStreaming);
    $("clearBtn").addEventListener("click", clearOutput);
    $("copyBtn").addEventListener("click", copyOutput);

    // Initial
    setStatus("", "Idle");
  </script>
</body>
</html>
